name: flutter_clean_riverpod_boilerplate
description: "Clean Architecture Flutter boilerplate with Riverpod, GoRouter, Dio and more."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- State management ---
  flutter_riverpod: ^2.5.1

  # --- Routing ---
  go_router: ^14.2.0

  # --- Networking ---
  dio: ^5.5.0
  pretty_dio_logger: ^1.4.0

  # --- Functional error handling ---
  fpdart: ^1.1.0

  # --- Network awareness ---
  connectivity_plus: ^6.0.5

  # --- Storage ---
  flutter_secure_storage: ^9.2.2

  # --- Theming / UI ---
  flutter_screenutil: ^5.9.0

  # --- Logging ---
  logger: ^2.4.0

  # --- Internationalization ---
  intl: any

  # --- Push notifications (FCM) & deep links ---
  # `app_links` is the maintained replacement for the abandoned
  # `uni_links` package. It handles incoming custom-scheme URIs (Android
  # IntentFilter + iOS CFBundleURLTypes) AND https Universal / App Links
  # through a single Dart stream. FCM is added in Phase D.
  app_links: ^6.3.2
  # Firebase Cloud Messaging. Requires per-flavor google-services.json /
  # GoogleService-Info.plist files in the platform folders (gitignored).
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- Linting ---
  very_good_analysis: ^6.0.0

  # --- Code generation ---
  # Riverpod providers are hand-written throughout this boilerplate, so the
  # codegen packages (riverpod_generator, riverpod_annotation) are intentionally
  # absent. build_runner is kept available so future migrations to @riverpod
  # or freezed can be staged without re-adding top-level deps.
  build_runner: ^2.4.13

  # --- Testing ---
  mocktail: ^1.0.4

  # --- App branding (icons + splash) ---
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/branding/

# --- App branding -----------------------------------------------------------
# Source assets live in assets/branding/. Per-flavor variants are generated
# into android/app/src/{flavor}/res, android/app/src/main/res/drawable-*/ and
# ios/Runner/Assets.xcassets/LaunchImage*.imageset so dev, staging and prod
# look distinct on the home screen and during launch.
#
# Regenerate everything with:
#   fvm dart run flutter_launcher_icons            # reads all flutter_launcher_icons-*.yaml
#   fvm dart run flutter_native_splash:create -A   # reads all flutter_native_splash-*.yaml
#
# (See flutter_launcher_icons-<flavor>.yaml and flutter_native_splash-<flavor>.yaml.)
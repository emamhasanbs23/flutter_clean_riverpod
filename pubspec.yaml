name: flutter_clean_riverpod_boilerplate
description: "Clean Architecture Flutter boilerplate with Riverpod, GoRouter, Dio and more."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  app_links: ^7.2.0
  connectivity_plus: ^7.2.0
  cupertino_icons: ^1.0.8
  dart_mappable: ^4.8.0
  dio: ^5.5.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_screenutil: ^5.9.0
  flutter_secure_storage: ^10.3.1
  fpdart: ^1.1.0
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  intl: any
  json_annotation: ^4.9.0
  logger: ^2.4.0
  pretty_dio_logger: ^1.4.0
  retrofit: ^4.9.2
  riverpod_annotation: ^4.0.3

dev_dependencies:
  build_runner: ^2.4.13
  dart_mappable_builder: ^4.8.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_test:
    sdk: flutter
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  retrofit_generator: ^10.2.7
  riverpod_generator: ^4.0.4
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/branding/

# --- App branding -----------------------------------------------------------
# Source assets live in assets/branding/. Per-flavor variants are generated
# into android/app/src/{flavor}/res, android/app/src/main/res/drawable-*/ and
# ios/Runner/Assets.xcassets/LaunchImage*.imageset so dev, staging and prod
# look distinct on the home screen and during launch.
#
# Regenerate everything with:
#   fvm dart run flutter_launcher_icons            # reads all flutter_launcher_icons-*.yaml
#   fvm dart run flutter_native_splash:create -A   # reads all flutter_native_splash-*.yaml
#
# (See flutter_launcher_icons-<flavor>.yaml and flutter_native_splash-<flavor>.yaml.)